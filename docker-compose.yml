version: "3.9"

services:
  # ─── PostgreSQL 15 ───────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: gobase-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gobase
      POSTGRES_PASSWORD: gobase_secret
      POSTGRES_DB: gobase
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gobase"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis 7 ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gobase-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO (S3-compatible) ───────────────────────────
  minio:
    image: minio/minio:latest
    container_name: gobase-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:
