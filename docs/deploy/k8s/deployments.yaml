# GoBase Kubernetes Deployments
# All services share the same Docker image; the entrypoint selects the binary.
# Replace YOUR_REGISTRY/gobase:VERSION with your actual image tag.

# ─── Gateway ──────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: gobase
  labels:
    app: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: YOUR_REGISTRY/gobase:VERSION
          command: ["/usr/local/bin/gateway"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: gobase-config
            - secretRef:
                name: gobase-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
