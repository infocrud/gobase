# Internal ClusterIP services for inter-service communication
# The gateway is the only service exposed externally (via Ingress)

apiVersion: v1
kind: Service
metadata:
  name: gateway-svc
  namespace: gobase
spec:
  selector:
    app: gateway
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: auth-svc
  namespace: gobase
spec:
  selector:
    app: auth
  ports:
    - port: 8001
      targetPort: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: rest-svc
  namespace: gobase
spec:
  selector:
    app: rest
  ports:
    - port: 8002
      targetPort: 8002
---
apiVersion: v1
kind: Service
metadata:
  name: realtime-svc
  namespace: gobase
spec:
  selector:
    app: realtime
  ports:
    - port: 8003
      targetPort: 8003
---
apiVersion: v1
kind: Service
metadata:
  name: storage-svc
  namespace: gobase
spec:
  selector:
    app: storage
  ports:
    - port: 8004
      targetPort: 8004
---
apiVersion: v1
kind: Service
metadata:
  name: functions-svc
  namespace: gobase
spec:
  selector:
    app: functions
  ports:
    - port: 8005
      targetPort: 8005
