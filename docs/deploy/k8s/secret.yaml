# Base64-encode each value: echo -n 'value' | base64
# Replace ALL placeholder values before applying.
apiVersion: v1
kind: Secret
metadata:
  name: gobase-secrets
  namespace: gobase
type: Opaque
stringData:
  JWT_SECRET: "CHANGE_ME_64_CHAR_HEX_SECRET"
  DB_PASSWORD: "CHANGE_ME_DB_PASSWORD"
  MINIO_SECRET_KEY: "CHANGE_ME_MINIO_SECRET"
  SMTP_PASS: "CHANGE_ME_SMTP_PASSWORD"
